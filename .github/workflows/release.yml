name: "Release"

on: workflow_dispatch

jobs:
  release-preflight:
    name: Release preflight
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release-config.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify release configuration
        id: release-config
        shell: bash
        run: |
          set -euo pipefail

          node <<'NODE'
          const fs = require("fs");

          const errors = [];
          const tauri = JSON.parse(fs.readFileSync("src-tauri/tauri.conf.json", "utf8"));
          const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const cargo = fs.readFileSync("src-tauri/Cargo.toml", "utf8");
          const cargoVersion = cargo.match(/^\s*version\s*=\s*"([^"]+)"/m)?.[1];
          const version = tauri.version;

          if (!version) {
            errors.push("src-tauri/tauri.conf.json is missing a version.");
          }
          if (pkg.version !== version) {
            errors.push(`package.json version (${pkg.version}) does not match tauri.conf.json (${version}).`);
          }
          if (cargoVersion !== version) {
            errors.push(`src-tauri/Cargo.toml version (${cargoVersion}) does not match tauri.conf.json (${version}).`);
          }
          if (tauri.bundle?.createUpdaterArtifacts !== true) {
            errors.push("bundle.createUpdaterArtifacts must be true before running the signed release workflow.");
          }

          const updater = tauri.plugins?.updater;
          if (!updater?.pubkey) {
            errors.push("plugins.updater.pubkey must be configured before running the signed release workflow.");
          }
          if (!Array.isArray(updater?.endpoints) || updater.endpoints.length === 0) {
            errors.push("plugins.updater.endpoints must contain the release latest.json endpoint.");
          }

          const signCommand = tauri.bundle?.windows?.signCommand;
          if (!signCommand) {
            errors.push("bundle.windows.signCommand must be configured for Windows release signing.");
          } else {
            if (!signCommand.includes("%1")) {
              errors.push("bundle.windows.signCommand must include the %1 artifact placeholder.");
            }
            if (/Handy|cjpais|CJ-Signing/.test(signCommand)) {
              errors.push("bundle.windows.signCommand still appears to reference Handy upstream signing configuration.");
            }
          }

          if (errors.length > 0) {
            for (const error of errors) {
              console.log(`::error::${error}`);
            }
            process.exit(1);
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          NODE

      - name: Check release tag is unused
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ steps.release-config.outputs.version }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "::error::Release tag ${tag} already exists."
            exit 1
          fi

      - name: Verify signing secrets
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          required=(
            APPLE_ID
            APPLE_ID_PASSWORD
            APPLE_PASSWORD
            APPLE_TEAM_ID
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            KEYCHAIN_PASSWORD
            AZURE_CLIENT_ID
            AZURE_CLIENT_SECRET
            AZURE_TENANT_ID
            TAURI_SIGNING_PRIVATE_KEY
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          )

          missing=()
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing release signing secrets: ${missing[*]}"
            exit 1
          fi

  create-release:
    needs: release-preflight
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
      version: ${{ needs.release-preflight.outputs.version }}
    steps:
      - name: Create Draft Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ needs.release-preflight.outputs.version }}`,
              name: `v${{ needs.release-preflight.outputs.version }}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true
            })
            return data.id

  publish-tauri:
    permissions:
      contents: write
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-26" # for Arm based macs (M1 and above). Uses macOS 26 for Apple Intelligence SDK.
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "ubuntu-22.04" # Build .deb on 22.04
            args: "--bundles deb"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04" # Build AppImage and RPM on 24.04
            args: "--bundles appimage,rpm"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04-arm" # Build for ARM64 Linux
            args: "--bundles appimage,deb,rpm"
            target: "aarch64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: true
      asset-prefix: "speakmore"
      upload-artifacts: false
      release-id: ${{ needs.create-release.outputs.release-id }}
    secrets: inherit
